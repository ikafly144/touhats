name: Sync Assets from TOU-Mira

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release info
        id: get_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag=$(gh release view --repo AU-Avengers/TOU-Mira --json tagName -q .tagName)
          echo "tag=$latest_tag" >> $GITHUB_OUTPUT

          # Check if we already have this tag
          if git rev-parse "$latest_tag" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download and Extract Assets
        if: steps.get_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create directories
          mkdir -p download/x86 download/x64
          mkdir -p extracted/x86 extracted/x64
          mkdir -p x86 x64

          # Download x86
          gh release download ${{ steps.get_release.outputs.tag }} \
            --repo AU-Avengers/TOU-Mira \
            --pattern "*x86-steam-itch.zip" \
            --dir download/x86

          # Download x64
          gh release download ${{ steps.get_release.outputs.tag }} \
            --repo AU-Avengers/TOU-Mira \
            --pattern "*x64-epic-msstore.zip" \
            --dir download/x64

          # Extract and move files
          unzip download/x86/*.zip -d extracted/x86
          find extracted/x86 -name "touhats.bundle" -exec cp {} x86/touhats.bundle \;
          find extracted/x86 -name "touhats.catalog" -exec cp {} x86/touhats.catalog \;

          unzip download/x64/*.zip -d extracted/x64
          find extracted/x64 -name "touhats.bundle" -exec cp {} x64/touhats.bundle \;
          find extracted/x64 -name "touhats.catalog" -exec cp {} x64/touhats.catalog \;

      - name: Check for changes
        id: check_changes
        if: steps.get_release.outputs.exists == 'false'
        run: |
          git add -N x86 x64
          if git diff --exit-code x86 x64; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Prepare Archives
        if: steps.get_release.outputs.exists == 'false' && steps.check_changes.outputs.changed == 'true'
        run: |
          zip -j touhats-x86.zip x86/touhats.bundle x86/touhats.catalog
          zip -j touhats-x64.zip x64/touhats.bundle x64/touhats.catalog

      - name: Commit and Push
        if: steps.get_release.outputs.exists == 'false' && steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x86/ x64/
          # Remove top-level files if they exist from previous version
          git rm --ignore-unmatch touhats.bundle touhats.catalog
          git commit -m "Update assets from TOU-Mira ${{ steps.get_release.outputs.tag }}"
          git push

      - name: Create Release
        if: steps.get_release.outputs.exists == 'false' && steps.check_changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_release.outputs.tag }}
          name: TOU-Mira ${{ steps.get_release.outputs.tag }}
          files: |
            touhats-x86.zip
            touhats-x64.zip
          body: |
            Automated sync from AU-Avengers/TOU-Mira ${{ steps.get_release.outputs.tag }}

            Files:
            - touhats-x86.zip
            - touhats-x64.zip
